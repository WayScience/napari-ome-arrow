name: napari-ome-arrow
display_name: OME-Arrow
contributions:
  commands:
    - id: napari-ome-arrow.get_reader
      python_name: napari_ome_arrow._reader:napari_get_reader
      title: Open OME-Arrow data
    - id: napari-ome-arrow.write_image
      python_name: napari_ome_arrow._writer:napari_write_image
      title: Save image as OME-Arrow
    - id: napari-ome-arrow.write_labels
      python_name: napari_ome_arrow._writer:napari_write_labels
      title: Save labels as OME-Arrow
  readers:
    - command: napari-ome-arrow.get_reader
      filename_patterns:
        # OME-Parquet
        - "*.ome.parquet"
        - "*.parquet"
        - "*.pq"
        # OME-Vortex
        - "*.ome.vortex"
        - "*.vortex"
        # OME-TIFF
        - "*.ome.tif"
        - "*.ome.tiff"
        - "*.tif"
        - "*.tiff"
        # OME-Zarr
        - "*.ome.zarr"
        - "*.zarr"
      accepts_directories: true
  writers:
    - command: napari-ome-arrow.write_image
      layer_types:
        - image
      filename_extensions:
        - ".ome.parquet"
        - ".ome.vortex"
    - command: napari-ome-arrow.write_labels
      layer_types:
        - labels
      filename_extensions:
        - ".ome.parquet"
        - ".ome.vortex"
